# POC: Simulated backends for PayloadProcessor body-based routing test
# Uses the llm-d inference simulator (same as GAIE uses)
# Each simulator pretends to be a different model

---
# GPT-4 simulator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpt4-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpt4-backend
  template:
    metadata:
      labels:
        app: gpt4-backend
    spec:
      containers:
      - name: vllm-sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.2
        args:
        - --model
        - gpt-4
        - --port
        - "8080"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 10m

---
# Claude simulator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-backend
  template:
    metadata:
      labels:
        app: claude-backend
    spec:
      containers:
      - name: vllm-sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.2
        args:
        - --model
        - claude
        - --port
        - "8080"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 10m

---
# Default/fallback simulator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: default-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: default-backend
  template:
    metadata:
      labels:
        app: default-backend
    spec:
      containers:
      - name: vllm-sim
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.2
        args:
        - --model
        - default
        - --port
        - "8080"
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 10m

---
# Services (matching the ones in payload-processor-bbr.yaml)
apiVersion: v1
kind: Service
metadata:
  name: gpt4-backend
  namespace: default
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: gpt4-backend

---
apiVersion: v1
kind: Service
metadata:
  name: claude-backend
  namespace: default
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: claude-backend

---
apiVersion: v1
kind: Service
metadata:
  name: default-backend
  namespace: default
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: default-backend
