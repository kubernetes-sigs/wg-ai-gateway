apiVersion: v1
kind: Namespace
metadata:
  name: ai-gateway-system
  labels:
    app.kubernetes.io/name: payload-processor-controller
    app.kubernetes.io/component: namespace
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payload-processor-controller
  namespace: ai-gateway-system
  labels:
    app.kubernetes.io/name: payload-processor-controller
    app.kubernetes.io/component: controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: payload-processor-controller
  labels:
    app.kubernetes.io/name: payload-processor-controller
    app.kubernetes.io/component: controller
rules:
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services", "endpoints", "namespaces", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["discovery.k8s.io"]
  resources: ["endpointslices"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways", "httproutes", "gatewayclasses"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways/status", "httproutes/status", "gatewayclasses/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["ainetworking.x-k8s.io"]
  resources: ["payloadprocessors"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["ainetworking.x-k8s.io"]
  resources: ["payloadprocessors/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: payload-processor-controller
  labels:
    app.kubernetes.io/name: payload-processor-controller
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: payload-processor-controller
subjects:
- kind: ServiceAccount
  name: payload-processor-controller
  namespace: ai-gateway-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payload-processor-controller
  namespace: ai-gateway-system
  labels:
    app.kubernetes.io/name: payload-processor-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payload-processor-controller
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payload-processor-controller
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: payload-processor-controller
      containers:
      - name: controller
        image: localhost:5000/payload-processor-controller:latest
        imagePullPolicy: Always
        args:
        - --xds-port=9978
        - --agentgateway-image=ghcr.io/agentgateway/agentgateway:latest
        - --controller-service=payload-processor-controller.ai-gateway-system:9978
        ports:
        - containerPort: 9978
          name: xds
          protocol: TCP
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: payload-processor-controller
  namespace: ai-gateway-system
  labels:
    app.kubernetes.io/name: payload-processor-controller
    app.kubernetes.io/component: controller
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: payload-processor-controller
    app.kubernetes.io/component: controller
  ports:
  - name: xds
    port: 9978
    targetPort: 9978
    protocol: TCP
