# POC: PayloadProcessor — extracts model from body, sets as header (PreRouting)
apiVersion: ainetworking.x-k8s.io/v0alpha0
kind: PayloadProcessor
metadata:
  name: model-header-setter
  namespace: default
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: ai-gateway
  phase: PreRouting
  processors:
  - name: extract-model
    type: InProcess
    failureMode: FailClosed
    inProcess:
      request:
        setHeaders:
        - name: X-Gateway-Model-Name
          value: 'json(request.body).model'
        setBodyFields:
        # name is a JSONPath into the JSON body; value is a CEL expression.
        # Inject stream=true so a successful body mutation flips the upstream
        # response to Server-Sent Events (SSE). The transport change
        # (Content-Type: text/event-stream) is the primary validation signal.
        - name: '$.stream'
          value: 'true'
        # Inject stream_options.include_usage=true so the streamed response ends
        # with a non-null usage block — a streaming-only secondary signal. Set as
        # a whole object via a CEL map literal so no intermediate path must
        # pre-exist in the request body.
        - name: '$.stream_options'
          value: '{"include_usage": true}'
        removeBodyFields:
        # name is a JSONPath into the JSON body.
        - name: '$.user_email'
        # NOTE: intentionally NO `response:` transform block. A response-body
        # transform would force the gateway to buffer the upstream response,
        # which breaks SSE streaming and would invalidate this test.
