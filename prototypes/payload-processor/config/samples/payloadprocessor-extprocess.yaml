# POC: PayloadProcessor — extracts model from body, sets as header (PreRouting)
apiVersion: ainetworking.x-k8s.io/v0alpha0
kind: PayloadProcessor
metadata:
  name: extproc-model-header-setter
  namespace: default
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: ai-gateway
  phase: PreRouting
  processors:
  - name: extract-model
    type: ExtProcess
    failureMode: FailClosed
    extProcess:
      backendRef:
        name: ext-process-bbr
        port: 4444
        kind: Service

---
# POC: ExtProcess server that extracts model from body and sets X-Gateway-Model-Name header
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-process-bbr
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ext-process-bbr
  template:
    metadata:
      labels:
        app: ext-process-bbr
    spec:
      containers:
      - name: ext-process-bbr
        image: localhost:5000/ext-proc-server:latest
        imagePullPolicy: IfNotPresent
        args: ["--port", "18080"]
        ports:
        - containerPort: 18080
          protocol: TCP
        resources:
          requests:
            cpu: 10m
            memory: 32Mi

---
apiVersion: v1
kind: Service
metadata:
  name: ext-process-bbr
  namespace: default
spec:
  ports:
  - port: 4444
    targetPort: 18080
    protocol: TCP
    appProtocol: kubernetes.io/h2c
  selector:
    app: ext-process-bbr
